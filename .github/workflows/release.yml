name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-amd64:
    name: Build linux-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Strip binary
        run: strip target/release/avalanche-rs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avalanche-rs-linux-amd64
          path: target/release/avalanche-rs

  build-linux-arm64:
    name: Build linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: cargo build --release --target aarch64-unknown-linux-gnu
      - name: Strip binary
        run: aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/avalanche-rs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avalanche-rs-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/avalanche-rs

  build-darwin-arm64:
    name: Build darwin-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: brew install protobuf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Strip binary
        run: strip target/release/avalanche-rs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avalanche-rs-darwin-arm64
          path: target/release/avalanche-rs

  release:
    name: Create Release
    needs: [build-linux-amd64, build-linux-arm64, build-darwin-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release binaries
        run: |
          mkdir -p release
          cp artifacts/avalanche-rs-linux-amd64/avalanche-rs release/avalanche-rs-linux-amd64
          cp artifacts/avalanche-rs-linux-arm64/avalanche-rs release/avalanche-rs-linux-arm64
          cp artifacts/avalanche-rs-darwin-arm64/avalanche-rs release/avalanche-rs-darwin-arm64
          cd release
          sha256sum avalanche-rs-* > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/avalanche-rs-linux-amd64
            release/avalanche-rs-linux-arm64
            release/avalanche-rs-darwin-arm64
            release/SHA256SUMS.txt
